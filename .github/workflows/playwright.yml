name: Playwright Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        type: choice
        default: 'production'
        options:
          - production
          - staging
          - development

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, api]

    steps:

      - name: Setup Docker config
        run: echo "DOCKER_CONFIG=$(mktemp -d)" >> $GITHUB_ENV
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "env=production" >> $GITHUB_OUTPUT
          fi

      - name: Run Playwright tests on ${{ matrix.project }} [${{ steps.set-env.outputs.env }}]
        run: npx dotenvx run -f .env.${{ steps.set-env.outputs.env }} -- playwright test --project=${{ matrix.project }}
        env:
          CI: true
          HOME: /root
          DOTENV_PRIVATE_KEY: ${{ steps.set-env.outputs.env == 'production' && secrets.DOTENV_PRIVATE_KEY || steps.set-env.outputs.env == 'staging' && secrets.DOTENV_PRIVATE_KEY_STAGING || secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ steps.set-env.outputs.env }}-${{ matrix.project }}
          path: |
            reports/
            test-results/
          retention-days: 30

  report:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: List all test results
        run: |
          echo "Test execution completed for all projects"
          ls -R all-reports/
